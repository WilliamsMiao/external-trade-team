name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Docker Compose
        run: docker compose config --quiet
      
      - name: Check YAML syntax
        run: |
          for f in configs/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))"
          done
