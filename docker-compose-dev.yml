# 外部贸易团队 - Docker Compose 配置

networks:
  trade_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: trade_postgres
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: openclaw_trade
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - trade_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_trade"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: trade_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - trade_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PgAdmin - 数据库管理工具
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trade_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - trade_network
    restart: unless-stopped
    depends_on:
      - postgres

  # 主应用程序容器 (Node.js)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: external-trade-team:latest
    container_name: trade_app
    environment:
      NODE_ENV: production
      PORT: 18789
      DATABASE_URL: postgresql://openclaw:${DB_PASSWORD}@postgres:5432/openclaw_trade
      REDIS_URL: redis://redis:6379
      TIMEZONE: Asia/Hong_Kong
      
      # MiniMax LLM API 配置
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_API_BASE_URL: ${MINIMAX_API_BASE_URL}
      MINIMAX_MODEL_GENERAL: ${MINIMAX_MODEL_GENERAL}
      MINIMAX_MODEL_HIGHSPEED: ${MINIMAX_MODEL_HIGHSPEED}
      MINIMAX_MODEL_REASONING: ${MINIMAX_MODEL_REASONING}
    ports:
      - "18789:18789"
    networks:
      - trade_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# 快速启动指令:
# docker compose -f docker-compose-dev.yml up -d
# 查看日志:
# docker compose -f docker-compose-dev.yml logs -f
# 停止:
# docker compose -f docker-compose-dev.yml down
